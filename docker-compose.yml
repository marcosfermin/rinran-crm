services:
  backend:
    build: ./backend
    container_name: rinran-backend
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 4000
      DB_PATH: /data/rinran.db
    volumes:
      - crm-data:/data
    depends_on:
      - waha
    networks:
      - rinran

  frontend:
    build: ./frontend
    container_name: rinran-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - rinran

  waha:
    image: devlikeapro/waha
    container_name: rinran-waha
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      WHATSAPP_API_KEY: ${WAHA_API_KEY:-rinran-waha-key-change-me}
      WHATSAPP_HOOK_URL: http://backend:4000/webhook
      WHATSAPP_HOOK_EVENTS: message
      WHATSAPP_DEFAULT_ENGINE: NOWEB
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME:-admin}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD:-admin}
    volumes:
      - waha-data:/app/.sessions
    networks:
      - rinran

volumes:
  crm-data:
  waha-data:

networks:
  rinran:
    driver: bridge
